services:
  traefik:
    image: traefik:v3.6.8
    container_name: traefik
    depends_on: [tailscale]
    network_mode: "service:tailscale" # Traefik "lives" inside Tailscale
    command:
      - "--api.dashboard=true"
      # - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      # - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # - "--certificatesresolvers.myresolver.tailscale=true"
      # HTTP Challenge (Let's Encrypt)
      # - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      # - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      # - ./acme.json:/letsencrypt/acm.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      # - "traefik.http.routers.traefik.tls.certresolver=myresolver"
      - "traefik.docker.network=proxy-tier"

  whoami:
    image: traefik/whoami
    container_name: traefik-whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
      # - "traefik.http.routers.whoami.tls.certresolver=myresolver"
    networks:
      - proxy-tier
networks:
  proxy-tier:
    external: true
