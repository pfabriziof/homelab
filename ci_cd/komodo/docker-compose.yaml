networks:
  proxy-tier:
    external: true
services:
  postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:${FERRETDB_POSTGRESQL_IMAGE_TAG}
    container_name: komodo-postgres
    labels:
      komodo.skip:
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KOMODO_DB_USERNAME}
      POSTGRES_PASSWORD: ${KOMODO_DB_PASSWORD}
      POSTGRES_DB: postgres
    networks:
      - proxy-tier

  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:${FERRETDB_IMAGE_TAG}
    container_name: komodo-ferretdb
    labels:
      komodo.skip:
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ferretdb-state:/state
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://${KOMODO_DB_USERNAME}:${KOMODO_DB_PASSWORD}@postgres:5432/postgres
    networks:
      - proxy-tier

  core:
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-core
    restart: unless-stopped
    depends_on:
      - ferretdb
    environment:
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
      KOMODO_JWT_SECRET: ${KOMODO_JWT_SECRET}
      KOMODO_PERIPHERY_PUBLIC_KEY: ${KOMODO_PERIPHERY_PUBLIC_KEY}
      KOMODO_PRIVATE_KEY_FILE: ${KOMODO_PRIVATE_KEY_FILE:-/config/keys/core.key}
    labels:
      - "komodo.skip=true"
      - "traefik.enable=true"
      - "traefik.http.routers.komodo.rule=Host(`komodo.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.komodo.entrypoints=websecure"
      - "traefik.http.routers.komodo.tls.certresolver=mydnschallenge"
      - "traefik.http.services.komodo.loadbalancer.server.port=9120"
    volumes:
      - ${COMPOSE_COMODO_BACKUPS_PATH:-/etc/komodo/backups}:/backups
      - ./config/core.config.toml:/config/config.toml
      - /etc/komodo/keys:/config/keys
    networks:
      - proxy-tier

  periphery:
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-periphery
    restart: unless-stopped
    environment:
      PERIPHERY_SSL_ENABLED: true
      PERIPHERY_CORE_PUBLIC_KEYS: ${PERIPHERY_CORE_PUBLIC_KEYS}
      PERIPHERY_PRIVATE_KEY_FILE: ${PERIPHERY_PRIVATE_KEY_FILE:-/config/keys/periphery.key}
    labels:
      - "komodo.skip=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:/etc/komodo
      - /etc/komodo/keys:/config/keys
    networks:
      - proxy-tier

volumes:
  postgres-data:
  ferretdb-state:

